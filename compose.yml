services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: cadastrodb
      POSTGRES_USER: apiuser
      POSTGRES_PASSWORD: SenhaForte123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    image: api-cadastro
    container_name: api-cadastro
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres-data:
